# Дополнительные настройки брокера Kafka.
# Важно: базовые параметры (listeners/advertised listeners и т.п.) задаются через env в compose/stack.

# Логи и ретеншн (пример)
log.retention.hours=168
log.segment.bytes=1073741824

# Минимальные безопасные дефолты
unclean.leader.election.enable=false
delete.topic.enable=true

