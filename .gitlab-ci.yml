stages:
  - lint
  - validate
  - deploy
  - post_deploy_verify

# --- lint ---

lint:shellcheck:
  stage: lint
  tags:
    - kafka_infra
  script:
    - |
      set -euo pipefail
      docker run --rm -v "$PWD:/mnt" -w /mnt koalaman/shellcheck:stable \
        sh -c 'files=$(find /mnt/kafka-infrastructure/scripts -name "*.sh" -type f | sort); [ -z "$files" ] && exit 0; shellcheck $files'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# --- validate ---

variables:
  # Значения только для `docker compose config` (подстановка в docker-stack.yml)
  CI_KAFKA_ADVERTISED_HOST: "127.0.0.1"
  CI_KAFKA_KRAFT_CLUSTER_ID: "ci-validate-cluster-id-0123456789ab"

validate:compose:
  stage: validate
  tags:
    - kafka_infra
  script:
    - docker version
    - cd kafka-infrastructure/docker
    - docker compose version
    - |
      export KAFKA_ADVERTISED_HOST="${CI_KAFKA_ADVERTISED_HOST}"
      export KAFKA_KRAFT_CLUSTER_ID="${CI_KAFKA_KRAFT_CLUSTER_ID}"
      docker compose -f docker-compose.yml config >/dev/null
    - |
      export KAFKA_ADVERTISED_HOST="${CI_KAFKA_ADVERTISED_HOST}"
      export KAFKA_KRAFT_CLUSTER_ID="${CI_KAFKA_KRAFT_CLUSTER_ID}"
      docker compose -f docker-stack.yml config >/dev/null
    - |
      export KAFKA_UI_ADMIN_PASSWORD="${KAFKA_UI_ADMIN_PASSWORD:?KAFKA_UI_ADMIN_PASSWORD required (Kafka UI; задайте в GitLab CI/CD Variables, masked)}"
      docker compose -f kafka-ui/docker-compose.yml config >/dev/null
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# --- deploy ---

deploy:swarm:
  stage: deploy
  tags:
    - kafka_infra
  resource_group: kafka-prod
  environment:
    name: production
  when: manual
  script:
    - cd kafka-infrastructure
    - |
      set -euo pipefail
      : "${KAFKA_PORT:?required}"
      : "${SCHEMA_REGISTRY_PORT:?required}"
      : "${KAFKA_KRAFT_CLUSTER_ID:?required}"
      : "${KAFKA_ADVERTISED_HOST:?required}"
      : "${STACK_NAME:?required}"
    - bash scripts/deploy/write-stack-env.sh .env
    - set -a
    - . ./.env
    - set +a
    - docker info >/dev/null
    - bash scripts/deploy/ensure-kafka-node-label.sh
    - docker stack deploy --with-registry-auth --compose-file docker/docker-stack.yml "${STACK_NAME}"
    - |
      printf '{"ci_commit_sha":"%s","stack_name":"%s","manifest":"docker/docker-stack.yml"}\n' \
        "${CI_COMMIT_SHA}" "${STACK_NAME}" > docker/deploy-manifest.json
  artifacts:
    name: "stack-manifest-${CI_COMMIT_SHORT_SHA}"
    paths:
      - kafka-infrastructure/docker/docker-stack.yml
      - kafka-infrastructure/docker/deploy-manifest.json
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

rollback:swarm:
  stage: deploy
  tags:
    - kafka_infra
  resource_group: kafka-prod
  environment:
    name: production
  when: manual
  needs: []
  variables:
    GIT_DEPTH: 0
  script:
    - test -n "${ROLLBACK_COMMIT_SHA:-}" || (echo "ROLLBACK_COMMIT_SHA не задан" && exit 1)
    - |
      set -euo pipefail
      : "${KAFKA_PORT:?required}"
      : "${SCHEMA_REGISTRY_PORT:?required}"
      : "${KAFKA_KRAFT_CLUSTER_ID:?required}"
      : "${KAFKA_ADVERTISED_HOST:?required}"
      : "${STACK_NAME:?required}"
    - bash kafka-infrastructure/scripts/deploy/resolve-rollback-commit.sh "${ROLLBACK_COMMIT_SHA}"
    - git checkout "${ROLLBACK_COMMIT_SHA}" -- kafka-infrastructure/docker/docker-stack.yml
    - cd kafka-infrastructure
    - bash scripts/deploy/write-stack-env.sh .env
    - set -a
    - . ./.env
    - set +a
    - bash scripts/deploy/ensure-kafka-node-label.sh
    - docker stack deploy --with-registry-auth --compose-file docker/docker-stack.yml "${STACK_NAME}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

# --- post deploy ---

verify:stack:
  stage: post_deploy_verify
  tags:
    - kafka_infra
  needs:
    - job: deploy:swarm
      artifacts: false
  script:
    - cd kafka-infrastructure
    - |
      set -euo pipefail
      : "${KAFKA_PORT:?required}"
      : "${SCHEMA_REGISTRY_PORT:?required}"
      : "${KAFKA_KRAFT_CLUSTER_ID:?required}"
      : "${KAFKA_ADVERTISED_HOST:?required}"
      : "${STACK_NAME:?required}"
    - bash scripts/deploy/write-stack-env.sh .env
    - set -a
    - . ./.env
    - set +a
    - export KAFKA_HOST="${VERIFY_KAFKA_HOST:-localhost}"
    - bash scripts/deploy/verify-stack.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
