# Общие переменные для Kafka-host.

# Где раскладываем инфраструктуру на сервере
remote_kafka_infra_dir: /opt/kafka-infrastructure

# env для docker stack/compose
stack_name: kafka
kafka_advertised_host: 185.28.85.126
kafka_port: 9092
schema_registry_port: 8081

# KRaft (single-node)
kafka_node_id: 1
# Важно: этот Cluster ID должен быть стабильным. Для генерации нового:
# kafka-storage random-uuid (или kafka-storage.sh random-uuid).
kafka_kraft_cluster_id: MkU3OEVBNTcwNTJENDM2Qk

# Firewall allowlist (PLAINTEXT + ограничение по IP)
enable_ufw: true
allowed_kafka_clients:
  - 185.39.79.97   # Producer
  - 203.31.40.44   # Consumer (notification service)

# Кому разрешать SSH (поменяйте на ваш IP/подсеть)
ssh_allowed_cidrs:
  - 185.39.79.33/32

# Открывать ли Schema Registry наружу (если не нужно — оставьте пустым списком)
allowed_schema_registry_clients:
  - 185.39.79.97
  - 203.31.40.44

