# Общие переменные для Kafka-host.

# Где раскладываем инфраструктуру на сервере
remote_kafka_infra_dir: /opt/kafka-infrastructure

# env для docker stack/compose
stack_name: kafka
kafka_advertised_host: 185.28.85.126
kafka_port: 9092
schema_registry_port: 8081

# KRaft (single-node)
kafka_node_id: 1
# Важно: этот Cluster ID должен быть стабильным. Для генерации нового:
# kafka-storage random-uuid (или kafka-storage.sh random-uuid).
kafka_kraft_cluster_id: MkU3OEVBNTcwNTJENDM2Qk

# Firewall allowlist (PLAINTEXT + ограничение по IP)
enable_ufw: true
allowed_kafka_clients:
  - 185.39.79.97   # Producer
  - 203.31.40.44   # Consumer (notification service)

# Кому разрешать SSH (поменяйте на ваш IP/подсеть)
ssh_allowed_cidrs:
  - 185.39.79.33/32

# Открывать ли Schema Registry наружу (если не нужно — оставьте пустым списком)
allowed_schema_registry_clients:
  - 185.39.79.97
  - 203.31.40.44

# Декларативный список топиков, которые должны существовать в кластере.
# Создаются после деплоя (idempotent: --if-not-exists).
kafka_topics:
  - name: subscriber-events
    partitions: 3
    replication_factor: 1
    # configs задаются как kafka topic configs (retention.ms, cleanup.policy, max.message.bytes, ...)
    configs:
      retention.ms: 604800000   # 7 дней

  # Топик только для батчей уведомлений (в т.ч. токены) — отделяем от бизнес-событий.
  # Стартово 12 партиций: хороший баланс для параллелизма notification service.
  - name: subscriber-push
    partitions: 12
    replication_factor: 1
    configs:
      retention.ms: 259200000   # 3 дня (достаточно для ретраев/разборов)
