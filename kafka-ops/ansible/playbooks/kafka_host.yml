---
- name: Подготовка Kafka-host (Debian) и деплой kafka-infrastructure
  hosts: kafka_hosts
  become: true

  vars:
    local_kafka_infra_dir: "{{ playbook_dir }}/../../../kafka-infrastructure"
    remote_env_file: "{{ remote_kafka_infra_dir }}/.env"

  tasks:
    - name: Обновить apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Установить базовые пакеты
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - gnupg
          - ufw
        state: present

    # Debian 13: самый простой путь — docker.io из репозиториев Debian.
    - name: Установить Docker из репозитория Debian
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present

    - name: Включить и запустить Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Инициализировать Swarm (если ещё не инициализирован)
      ansible.builtin.shell: |
        set -e
        state="$(docker info -f '{{"{{"}}.Swarm.LocalNodeState{{"}}"}}' 2>/dev/null || true)"
        if [ "$state" != "active" ]; then
          docker swarm init
        fi
      args:
        executable: /bin/bash

    - name: Создать директорию под kafka-infrastructure
      ansible.builtin.file:
        path: "{{ remote_kafka_infra_dir }}"
        state: directory
        mode: "0755"

    - name: Скопировать kafka-infrastructure на сервер
      ansible.builtin.copy:
        src: "{{ local_kafka_infra_dir }}/"
        dest: "{{ remote_kafka_infra_dir }}/"
        mode: preserve

    - name: Сгенерировать .env для сервера
      ansible.builtin.copy:
        dest: "{{ remote_env_file }}"
        mode: "0600"
        content: |
          KAFKA_PORT={{ kafka_port }}
          SCHEMA_REGISTRY_PORT={{ schema_registry_port }}
          KAFKA_NODE_ID={{ kafka_node_id }}
          KAFKA_KRAFT_CLUSTER_ID={{ kafka_kraft_cluster_id }}
          KAFKA_ADVERTISED_HOST={{ kafka_advertised_host }}
          STACK_NAME={{ stack_name }}

    - name: (Опционально) Настроить UFW правила (без включения)
      ansible.builtin.shell: |
        set -e
        ufw --force reset
        ufw default deny incoming
        ufw default allow outgoing

        # SSH
        {% for cidr in ssh_allowed_cidrs %}
        ufw allow from {{ cidr }} to any port 22 proto tcp
        {% endfor %}

        # Kafka
        {% for ip in allowed_kafka_clients %}
        ufw allow from {{ ip }} to any port {{ kafka_port }} proto tcp
        {% endfor %}

        # Schema Registry (если нужен наружу)
        {% for ip in allowed_schema_registry_clients %}
        ufw allow from {{ ip }} to any port {{ schema_registry_port }} proto tcp
        {% endfor %}

        ufw status verbose
      when: enable_ufw | bool
      args:
        executable: /bin/bash

    - name: (Опционально) Включить UFW
      ansible.builtin.command: ufw --force enable
      when: enable_ufw | bool

    - name: Деплой docker stack
      ansible.builtin.shell: |
        set -e
        cd "{{ remote_kafka_infra_dir }}"
        export $(grep -v '^#' .env | xargs)
        docker stack deploy --compose-file docker/docker-stack.yml "{{ stack_name }}"
      args:
        executable: /bin/bash

