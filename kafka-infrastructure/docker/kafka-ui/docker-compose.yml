# Опционально: UI для кластера из docker/docker-compose.yml (сеть kafka-infra).
# Сначала поднимите основной compose в docker/, затем:
#   cd kafka-infrastructure/docker/kafka-ui
#   docker compose --env-file ../../.env up -d

services:
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "${KAFKA_UI_CLUSTER_NAME:-main}"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "${SCHEMA_REGISTRY_INTERNAL_URL:-http://schema-registry:8081}"

      AUTH_TYPE: "${KAFKA_UI_AUTH_TYPE:-LOGIN_FORM}"
      SPRING_SECURITY_USER_NAME: "${KAFKA_UI_ADMIN_USER:-admin}"
      SPRING_SECURITY_USER_PASSWORD: "${KAFKA_UI_ADMIN_PASSWORD:-changeme}"

    networks:
      - kafka-infra

networks:
  kafka-infra:
    external: true
