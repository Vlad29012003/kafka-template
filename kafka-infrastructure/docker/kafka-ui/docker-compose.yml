# Опционально: UI для кластера из docker/docker-compose.yml (сеть kafka-infra).
# Запуск из каталога kafka-infrastructure/docker/kafka-ui:
#   docker compose --env-file ../../.env up -d
version: "3.8"

services:
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: main
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"

      AUTH_TYPE: "LOGIN_FORM"
      SPRING_SECURITY_USER_NAME: "admin"
      SPRING_SECURITY_USER_PASSWORD: "${KAFKA_UI_ADMIN_PASSWORD:-changeme}"

    networks:
      - kafka-infra

networks:
  kafka-infra:
    external: true
