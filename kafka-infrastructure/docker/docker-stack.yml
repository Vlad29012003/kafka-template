# Swarm: перед деплоем на ноде с Kafka: docker node update --label-add kafka=true <node-name>
# Закрепление сервисов на ноде с меткой — чтобы volume и роль брокера не «переезжали».

services:
  kafka:
    # KRaft (без Zookeeper)
    image: confluentinc/cp-kafka:7.6.1
    stop_grace_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      # Настройки KRaft (single-node; для кластера — через env)
      KAFKA_NODE_ID: "${KAFKA_NODE_ID:-1}"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "${KAFKA_CONTROLLER_QUORUM_VOTERS:-1@kafka:9093}"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # Слушатели:
      # - PLAINTEXT://kafka:29092          (внутри overlay для Schema Registry)
      # - PLAINTEXT_HOST://0.0.0.0:9092   (наружу по published порту)
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      # Прод: задайте KAFKA_ADVERTISED_HOST (FQDN/IP), без дефолта localhost — см. env.example
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST:${KAFKA_ADVERTISED_HOST:?KAFKA_ADVERTISED_HOST}:${KAFKA_PORT:-9092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      CLUSTER_ID: "${KAFKA_KRAFT_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:-1}"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:-1}"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "${KAFKA_DEFAULT_REPLICATION_FACTOR:-1}"
      KAFKA_MIN_INSYNC_REPLICAS: "${KAFKA_MIN_INSYNC_REPLICAS:-1}"

      KAFKA_LOG_RETENTION_HOURS: "168"
      KAFKA_LOG_SEGMENT_BYTES: "1073741824"
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    networks:
      - kafka
    ports:
      - target: 9092
        published: ${KAFKA_PORT:-9092}
        protocol: tcp
        mode: host
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.kafka == true
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: stop-first
        monitor: 30s
      resources:
        reservations:
          memory: 1G
        limits:
          memory: 2G

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: "schema-registry"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:29092"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "BACKWARD"
    networks:
      - kafka
    ports:
      - target: 8081
        published: ${SCHEMA_REGISTRY_PORT:-8081}
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.kafka == true
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: stop-first
        monitor: 30s
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M

networks:
  kafka:
    driver: overlay

volumes:
  kafka_data:
