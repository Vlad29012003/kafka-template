version: "3.8"

services:
  kafka:
    # KRaft (без Zookeeper)
    image: confluentinc/cp-kafka:7.6.1
    environment:
      # Настройки KRaft (single-node)
      KAFKA_NODE_ID: "${KAFKA_NODE_ID:-1}"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # Слушатели:
      # - PLAINTEXT://kafka:29092          (внутри overlay сети для Schema Registry и внутренних клиентов)
      # - PLAINTEXT_HOST://0.0.0.0:9092   (наружу на хост по published порту)
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-localhost}:${KAFKA_PORT:-9092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Cluster ID для KRaft (один и тот же для всех нод кластера)
      CLUSTER_ID: "${KAFKA_KRAFT_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"

      # Поведение и безопасность дефолтов
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

      # Аналоги configs/kafka/server.properties
      KAFKA_LOG_RETENTION_HOURS: "168"
      KAFKA_LOG_SEGMENT_BYTES: "1073741824"
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    networks:
      - kafka
    ports:
      - target: 9092
        published: ${KAFKA_PORT:-9092}
        protocol: tcp
        mode: host
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      restart_policy:
        condition: on-failure

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    environment:
      SCHEMA_REGISTRY_HOST_NAME: "schema-registry"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:29092"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "BACKWARD"
    networks:
      - kafka
    ports:
      - target: 8081
        published: ${SCHEMA_REGISTRY_PORT:-8081}
        protocol: tcp
        mode: host
    deploy:
      restart_policy:
        condition: on-failure

networks:
  kafka:
    driver: overlay

volumes:
  kafka_data:
